---
- name: Play To Install Nginx Webserver
  hosts: pvt
  gather_facts: yes
  become: yes
  become_user: root
  vars:
   nginx_port: 80
   version: 1.0.0
  tags: nginx
  tasks:
  - name: Perform apt update
    shell: apt-get update -y
    tags: [apt, update]
  - name: Check Nginx Exists
    shell: nginx -v
    register: nginx_status_output
    ignore_errors: yes
    tags: [check]  
  - name: Install Nginx
    shell: apt-get install -y nginx && nginx -v
    when: nginx_status_output.rc != 0
    tags: [install]  
  - name: Start Nginx Server
    service: name=nginx state=started enabled=yes
    when: nginx_status_output.rc != 0
    tags: 
    - start
    #shell: service nginx start && systemctl enable nginx

