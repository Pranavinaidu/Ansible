- name: Install Base Tools
  hosts: testserver01:testserver02:testserver03
  gather_facts: yes
  become: yes
  become_user: root
  tags: basetools
  tasks:
    apt: 
      name:
        - unzip
        - net-tools
        - stress
    update_cache: yes
    cache_valid_time: 0
    when: ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '24.04'
